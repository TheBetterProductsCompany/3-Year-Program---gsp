<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE RELENTLESS PROTOCOL</title>
<style>
@import url('https://fonts.cdnfonts.com/css/lemon-milk');
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap');

:root {
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --surface-raised: #F0F0F2;
  --surface-glass: rgba(0,0,0,.015);
  --glass-border: rgba(0,0,0,.12);
  --glass-border-strong: rgba(0,0,0,.22);
  --glass-hover: rgba(0,0,0,.03);
  --white: #0A0A0A;
  --text: #0A0A0A;
  --text-secondary: #4A4A4F;
  --text-tertiary: #8E8E93;
  --border: rgba(0,0,0,.08);
  --border-light: rgba(0,0,0,.04);
  --green: #28A745;
  --green-soft: rgba(40,167,69,.08);
  --red: #DC3545;
  --red-soft: rgba(220,53,69,.08);
  --orange: #E67E22;
  --accent: #0A0A0A;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 18px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family:'Satoshi',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100%; -webkit-font-smoothing:antialiased;
  overflow-x:hidden; font-weight:400;
}

/* ═══════ LOGIN (dark for contrast) ═══════ */
#login {
  position:fixed; inset:0; z-index:9999;
  background:#0A0A0A; display:flex; align-items:center;
  justify-content:center; flex-direction:column;
  transition:opacity .6s,transform .6s;
}
#login.out { opacity:0; pointer-events:none; transform:scale(1.02); }
.l-pre {
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:10px;
  color:rgba(255,255,255,.1); margin-bottom:52px; text-transform:uppercase;
}
.l-title {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(28px,8vw,48px);
  letter-spacing:6px; color:#fff; margin-bottom:10px; text-transform:uppercase;
}
.l-sub {
  font-size:11px; letter-spacing:7px; color:rgba(255,255,255,.1);
  margin-bottom:52px; text-transform:uppercase;
}
#login input {
  width:300px; padding:18px 24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1); border-radius:var(--radius);
  color:#fff; font-family:'Satoshi',sans-serif; font-size:15px;
  letter-spacing:4px; text-align:center; outline:none; transition:all .3s;
}
#login input::placeholder { color:rgba(255,255,255,.15); font-size:11px; letter-spacing:5px; }
#login input:focus { border-color:rgba(255,255,255,.25); background:rgba(255,255,255,.08); }
.l-btn {
  margin-top:24px; padding:16px 56px;
  background:#fff; color:#0A0A0A; border-radius:980px;
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:5px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.l-btn:hover { opacity:.85; transform:translateY(-1px); }
.l-err {
  margin-top:18px; font-size:11px; letter-spacing:2px; color:#DC3545;
  opacity:0; transition:opacity .3s;
}
.l-err.on { opacity:1; }

/* ═══════ APP SHELL ═══════ */
#app { display:none; min-height:100vh; }
#app.on { display:block; }

/* ── STATUS BAR ── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; border-bottom:1px solid var(--border);
  background:var(--surface); flex-wrap:wrap; gap:10px;
}
.sb-left { display:flex; align-items:center; gap:16px; }
.live {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; border-radius:980px;
  background:var(--green-soft); border:1px solid rgba(40,167,69,.15);
}
.live-dot {
  width:6px; height:6px; background:var(--green); border-radius:50%;
  box-shadow:0 0 8px rgba(40,167,69,.4); animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }
.live span {
  font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:3px;
  color:var(--green); text-transform:uppercase;
}
.phase-tag {
  font-size:10px; letter-spacing:2px; color:var(--text-tertiary);
  padding:6px 14px; border-radius:980px;
  border:1px solid var(--border); text-transform:uppercase;
}
.sb-right { display:flex; align-items:center; gap:20px; }
.clock {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(16px,3vw,22px);
  letter-spacing:3px; color:var(--text); font-variant-numeric:tabular-nums; opacity:.5;
}
.date-display { font-size:10px; letter-spacing:3px; color:var(--text-tertiary); text-transform:uppercase; }

/* ── TOP NAV ── */
.top-nav {
  display:flex; align-items:center; justify-content:center;
  padding:12px 32px; gap:4px;
  border-bottom:1px solid var(--border);
  background:var(--surface); position:sticky; top:0; z-index:50;
}
.nav-tab {
  padding:10px 24px; font-family:'LEMON MILK',sans-serif; font-size:10px;
  letter-spacing:3px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:980px; background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.nav-tab:hover { color:var(--text-secondary); background:rgba(0,0,0,.03); }
.nav-tab.on { color:var(--text); background:rgba(0,0,0,.06); }

/* ── WEEK NAV ── */
.weeknav {
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding:16px 32px; border-bottom:1px solid var(--border);
  background:var(--surface);
}
.wn-btn {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  background:var(--bg); border:1px solid var(--border); border-radius:50%;
  color:var(--text-secondary); cursor:pointer; font-size:16px; transition:all .2s;
}
.wn-btn:hover { border-color:var(--text); color:var(--text); }
.wn-label {
  font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:3px;
  color:var(--text); text-transform:uppercase;
}

/* ── DAY TABS ── */
.dtabs {
  display:flex; justify-content:center;
  padding:10px 20px; gap:4px;
  border-bottom:1px solid var(--border); background:var(--surface);
}
.dtab {
  padding:8px 14px; font-family:'LEMON MILK',sans-serif; font-size:10px;
  letter-spacing:2px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:var(--radius-sm); background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.dtab:hover { color:var(--text-secondary); background:rgba(0,0,0,.03); }
.dtab.on { color:var(--surface); background:var(--text); }
.dtab.done::after { content:'✓'; margin-left:5px; font-size:9px; color:var(--green); }

/* ── CONTENT PANELS ── */
.panel { display:none; padding:36px 32px; max-width:960px; margin:0 auto; }
.panel.on { display:block; }

/* ── DAY HEADER ── */
.dh-code {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(20px,4vw,28px);
  letter-spacing:5px; color:var(--text); margin-bottom:24px; text-transform:uppercase;
}
.dh-meta { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:40px; }
.dh-m {
  padding:14px 20px; background:var(--surface);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
}
.dh-m-l { font-size:9px; letter-spacing:3px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px; }
.dh-m-v { font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:1px; color:var(--text); }

/* ── SECTIONS ── */
.sec { margin-bottom:32px; }
.sec-h {
  font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:5px;
  color:var(--text-secondary); padding:16px 0 12px;
  margin-bottom:12px; text-transform:uppercase;
}

/* ═══════ GLASS EXERCISE CARDS (black border on white) ═══════ */
.ex {
  display:flex; align-items:flex-start; padding:18px 20px;
  margin-bottom:8px;
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  cursor:pointer; transition:all .3s ease;
}
.ex:hover {
  border-color:var(--glass-border-strong);
  box-shadow:var(--shadow-md);
}
.ex.open {
  border-color:rgba(0,0,0,.25);
  box-shadow:var(--shadow-md);
  cursor:default;
}
.ex-dot {
  width:8px; height:8px; border:1.5px solid var(--text-tertiary);
  border-radius:50%; margin-top:6px; margin-right:16px; flex-shrink:0;
}
.ex.open .ex-dot { background:var(--text); border-color:var(--text); }
.ex-body { flex:1; }
.ex-name { font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; }
.ex-detail { font-size:13px; color:var(--text-secondary); }
.ex-note { font-size:11px; color:var(--text-tertiary); margin-top:5px; font-style:italic; }
.ex-toggle {
  font-size:9px; letter-spacing:3px; color:var(--text-tertiary); opacity:.4;
  margin-top:8px; text-transform:uppercase; transition:opacity .2s;
}
.ex:hover .ex-toggle { opacity:.7; }
.ex.open .ex-toggle { display:none; }

/* ── SET ROWS ── */
.ex-sets { display:none; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
.ex.open .ex-sets { display:block; }

.sets-hdr {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:10px; padding-bottom:8px; align-items:center;
  border-bottom:1px solid var(--border-light);
}
.sets-hdr span { font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.sets-hdr .sh-c { text-align:center; }

.set-row {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:8px; align-items:center;
}
.set-label { font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:1px; color:var(--text-tertiary); }
.set-target-wt {
  font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:1px;
  color:var(--text); opacity:.25; text-align:center; padding:10px 6px;
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm);
}
.set-input {
  width:100%; padding:11px 10px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; text-align:center; transition:all .2s;
}
.set-input:focus { border-color:rgba(0,0,0,.25); box-shadow:0 0 0 3px rgba(0,0,0,.04); }
.set-input::placeholder { color:var(--text-tertiary); font-size:11px; }

.pct-badge {
  display:flex; align-items:center; justify-content:center;
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:.5px;
  padding:8px 4px; text-align:center; border-radius:var(--radius-sm); transition:all .3s;
}
.pct-badge.hit { background:var(--green-soft); color:var(--green); }
.pct-badge.miss { background:var(--red-soft); color:var(--red); }
.pct-badge.neutral { background:rgba(0,0,0,.03); color:var(--text-tertiary); }

.set-confirm {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  background:var(--bg); border:1px solid var(--border); border-radius:50%;
  color:var(--text-tertiary); cursor:pointer; transition:all .25s; font-size:14px;
}
.set-confirm:hover { background:var(--surface-raised); color:var(--text); }
.set-confirm.saved { background:var(--green); color:#fff; border-color:var(--green); animation:confirmPop .3s; }
.set-confirm.failed { background:var(--red); color:#fff; }
.set-confirm.saving { opacity:.3; pointer-events:none; }
@keyframes confirmPop { 0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)} }

/* ── NOTES ── */
.notes {
  margin-top:36px; padding:22px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius); box-shadow:var(--shadow-sm);
}
.notes-h {
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:3px;
  color:var(--text-secondary); margin-bottom:14px; text-transform:uppercase;
}
.notes textarea {
  width:100%; min-height:80px; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px;
  font-family:'Satoshi',sans-serif; font-size:13px; color:var(--text);
  resize:vertical; outline:none; line-height:1.7;
}
.notes textarea:focus { border-color:rgba(0,0,0,.2); }
.notes textarea::placeholder { color:var(--text-tertiary); }

/* ── COMPLETE BTN ── */
.comp-btn {
  margin-top:28px; width:100%; padding:18px;
  background:var(--text); color:var(--surface); border-radius:var(--radius);
  font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:4px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.comp-btn:hover { opacity:.85; transform:translateY(-1px); }
.comp-btn.done { background:var(--green); color:#fff; }
.comp-btn.done:hover { transform:none; opacity:1; }

/* ── PLAN VIEW ── */
.ph-title {
  font-family:'LEMON MILK',sans-serif; font-size:16px; letter-spacing:4px;
  color:var(--text); margin-bottom:8px; text-transform:uppercase;
}
.ph-desc { font-size:13px; color:var(--text-secondary); margin-bottom:22px; line-height:1.5; }
.pw-row {
  display:flex; align-items:center; padding:16px 20px; margin-bottom:6px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .2s;
  box-shadow:var(--shadow-sm);
}
.pw-row:hover { border-color:var(--glass-border-strong); box-shadow:var(--shadow-md); }
.pw-row.cur { border-color:var(--text); border-width:2px; }
.pw-num { font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:2px; color:var(--text); width:80px; }
.pw-focus { font-size:12px; color:var(--text-secondary); flex:1; }
.pw-status { font-size:10px; color:var(--text-tertiary); }

/* ── STATS ── */
.sg { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.sc {
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:22px; box-shadow:var(--shadow-sm);
}
.sc-l { font-size:9px; letter-spacing:3px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:8px; }
.sc-v { font-family:'LEMON MILK',sans-serif; font-size:clamp(24px,4vw,32px); letter-spacing:2px; color:var(--text); }
.sc-s { font-size:11px; color:var(--text-tertiary); margin-top:4px; }
.prog-bar { width:100%; height:3px; background:var(--surface-raised); border-radius:2px; margin-top:12px; overflow:hidden; }
.prog-fill { height:100%; background:var(--text); border-radius:2px; transition:width .5s; }

/* ── PRs ── */
.pr-title { font-family:'LEMON MILK',sans-serif; font-size:14px; letter-spacing:3px; color:var(--text); margin-bottom:18px; text-transform:uppercase; }
.pr-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; margin-bottom:6px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);
}
.pr-name { font-size:13px; font-weight:500; color:var(--text); }
.pr-val { font-family:'LEMON MILK',sans-serif; font-size:14px; letter-spacing:1px; color:var(--text); opacity:.6; }
.pr-form { display:flex; gap:12px; margin-top:24px; align-items:flex-end; flex-wrap:wrap; }
.pr-fg { display:flex; flex-direction:column; gap:5px; }
.pr-fg label { font-size:10px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.pr-fg input {
  padding:12px 16px; border:1px solid var(--border); background:var(--bg);
  border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; width:160px;
}
.pr-fg input:focus { border-color:rgba(0,0,0,.2); }
.pr-fg select {
  padding:12px 16px; border:1px solid var(--border); background:var(--bg);
  border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; width:200px;
}
.pr-add {
  padding:12px 24px; background:var(--text); color:var(--surface); border-radius:980px;
  font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:2px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .2s;
}
.pr-add:hover { opacity:.85; }

/* ═══════ NUTRITION ═══════ */
.nut-hero { text-align:center; margin-bottom:36px; }
.nut-hero-title { font-family:'LEMON MILK',sans-serif; font-size:clamp(20px,4vw,28px); letter-spacing:5px; color:var(--text); text-transform:uppercase; margin-bottom:8px; }
.nut-hero-sub { font-size:13px; color:var(--text-secondary); }

.nut-summary {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;
  margin-bottom:36px; padding:26px 20px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
}
.nut-macro { display:flex; flex-direction:column; align-items:center; gap:3px; }
.nut-macro-label { font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.nut-macro-val { font-family:'LEMON MILK',sans-serif; font-size:18px; letter-spacing:1px; color:var(--text); }
.nut-macro-target { font-size:10px; color:var(--text-tertiary); }
.nut-macro-bar { width:100%; height:3px; background:var(--surface-raised); border-radius:2px; margin-top:6px; overflow:hidden; }
.nut-macro-fill { height:100%; border-radius:2px; transition:width .5s; }
.nut-macro-fill.on-track { background:var(--green); }
.nut-macro-fill.under { background:var(--text); opacity:.2; }
.nut-macro-fill.over { background:var(--orange); }

.meal-block {
  margin-bottom:8px; background:var(--surface);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  overflow:hidden; transition:all .25s; box-shadow:var(--shadow-sm);
}
.meal-block.open { border-color:var(--glass-border-strong); box-shadow:var(--shadow-md); }
.meal-header { display:flex; align-items:center; padding:16px 20px; cursor:pointer; gap:12px; transition:background .2s; }
.meal-header:hover { background:rgba(0,0,0,.01); }
.meal-time { font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; width:60px; flex-shrink:0; }
.meal-name { font-size:13px; font-weight:500; color:var(--text); flex:1; }
.meal-macros-preview { font-size:10px; color:var(--text-tertiary); }
.meal-confirm {
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  background:var(--bg); border:1px solid var(--border); border-radius:50%;
  color:var(--text-tertiary); cursor:pointer; transition:all .25s; font-size:12px;
}
.meal-confirm.done { background:var(--green); color:#fff; border-color:var(--green); }
.meal-body { padding:0 20px 18px; display:none; }
.meal-block.open .meal-body { display:block; }
.meal-items { font-size:13px; color:var(--text-secondary); line-height:1.8; margin-bottom:12px; }
.meal-why { font-size:11px; color:var(--text-tertiary); line-height:1.6; padding:12px 14px; background:var(--bg); border-radius:var(--radius-sm); }
.meal-locked { font-size:9px; letter-spacing:2px; color:var(--text-tertiary); opacity:.4; text-transform:uppercase; margin-top:10px; }
.meal-override { margin-top:12px; }
.meal-override-btn { font-size:10px; color:var(--text-tertiary); opacity:.5; cursor:pointer; background:none; border:none; padding:4px 0; transition:opacity .2s; }
.meal-override-btn:hover { opacity:.8; }
.meal-override-inputs { display:none; margin-top:10px; }
.meal-override-inputs.show { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.meal-ov-input { padding:10px; border:1px solid var(--border); background:var(--bg); border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:12px; color:var(--text); outline:none; text-align:center; }
.meal-ov-label { font-size:8px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; text-align:center; margin-bottom:4px; }

.supp-block {
  margin-top:28px; padding:22px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
}
.supp-title { font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:3px; color:var(--text-secondary); margin-bottom:16px; text-transform:uppercase; }
.supp-row { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid var(--border-light); gap:12px; }

<script>
// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
const PW='Spyder1';
function doLogin(){
  const val = document.getElementById('pw').value;
  if(val===PW){
    document.getElementById('login').classList.add('out');
    document.getElementById('app').classList.add('on');
    localStorage.setItem('r42auth','1');
    try { startApp(); } catch(e) { alert('App error: '+e.message); console.error(e); }
  } else {
    document.getElementById('lerr').classList.add('on');
    setTimeout(()=>document.getElementById('lerr').classList.remove('on'),2000);
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
if(localStorage.getItem('r42auth')==='1'){
  document.getElementById('login').classList.add('out');
  document.getElementById('app').classList.add('on');
  window.addEventListener('DOMContentLoaded',startApp);
}


const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAYNAMES=['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];
const TOTAL_WEEKS=35;
const PHASES=[
  {n:'FOUNDATION A',wks:[1,4],desc:'60-65%. Own every position.'},
  {n:'FOUNDATION B',wks:[5,8],desc:'65-70%. Loads climbing.'},
  {n:'FOUNDATION C',wks:[9,12],desc:'70-75%. Full snatch enters W9.'},
  {n:'ACCUMULATION A',wks:[13,16],desc:'Wave loading. 75-85%.'},
  {n:'ACCUMULATION B',wks:[17,20],desc:'Waves intensify. 78-90%.'},
  {n:'ACCUMULATION C',wks:[21,24],desc:'Peak waves. 80-93%.'},
  {n:'CONVERSION A',wks:[25,28],desc:'Daily maxes. Eccentric triphasic.'},
  {n:'CONVERSION B',wks:[29,32],desc:'Daily maxes. Isometric triphasic.'},
  {n:'CONVERSION C',wks:[33,35],desc:'Daily maxes. Explosive concentric.'},
];
function getPhase(w){return PHASES.find(p=>w>=p.wks[0]&&w<=p.wks[1])||PHASES[PHASES.length-1];}
function getPhaseNum(w){return PHASES.findIndex(p=>w>=p.wks[0]&&w<=p.wks[1])+1;}
function E(name,detail,note){return{name,detail,note:note||''};}

function isDl(w){return w===4||w===8||w===12||w===16||w===20||w===24||w===28||w===32;}
function isConv(w){return w>=25&&w<=35&&!isDl(w);}
function isWave(w){return w>=13&&w<=24&&!isDl(w);}
function lerp(s,e,w,sw,ew){if(w>=ew)return e;return Math.round(s+(e-s)*((w-sw)/(ew-sw)));}
function r5(n){return Math.round(n/5)*5;}

// ═══════════════════════════════════════════════════════════
// ATHLETE 1RMs (verified April 2026):
// Bench (flat): 315, Incline est ~300 | Clean: 200 | Row: 230
// Hip Thrust: 355 | Snatch: 115 | OHS: 155 | Arnold: 95
// FR Split Squat: 195 | Back BSS: 195 | Pull-ups: ~+50 | Chin-ups: ~+35
// Cossack: BW | Weight: 198 lbs
// ═══════════════════════════════════════════════════════════

// Power Clean: 1RM 200. Working 125→215
function cleanWt(w){const v=lerp(125,215,w,1,35);return isDl(w)?r5(v*0.6):r5(v);}
// Incline Bench: est 1RM ~300. Working 185→250
function benchWt(w){const v=lerp(185,250,w,1,35);return isDl(w)?r5(v*0.6):r5(v);}
// BB Hip Thrust: 1RM 355. Working 220→360
function htWt(w){const v=lerp(220,360,w,1,35);return isDl(w)?r5(v*0.6):r5(v);}
// Pendlay Row: 1RM 230. Working 145→240
function rowWt(w){const v=lerp(145,240,w,1,35);return isDl(w)?r5(v*0.6):r5(v);}
// Pull-ups/Chin-ups: rotating. Working +10→+65
function puWt(w){const v=lerp(10,65,w,1,35);return isDl(w)?Math.max(0,r5(v*0.6)):r5(v);}
// DB Arnold Press: 1RM ~95. Working 60→88
function pressWt(w){const v=lerp(60,88,w,1,35);return isDl(w)?r5(v*0.6):r5(v);}
// Snatch: 1RM 115. W1-4 hang at 45→55, then 55→130
function snWt(w){const v=w<=4?lerp(45,55,w,1,4):lerp(55,130,w,5,35);return isDl(w)?r5(v*0.55):r5(v);}
// OHS: 1RM 155. W1-4 mobility 75→85, then 85→175
function ohsWt(w){const v=w<=4?lerp(75,85,w,1,4):lerp(85,175,w,5,35);return isDl(w)?r5(v*0.55):r5(v);}
// Cossack: BW W1-4, then 25→115
function cosWt(w){if(w<=4)return 0;const v=lerp(25,115,w,5,35);return isDl(w)?r5(v*0.5):r5(v);}
// FR Split Squat / Back BSS: 1RM 195. Working 120→195
function ssWt(w){const v=lerp(120,195,w,1,35);return isDl(w)?r5(v*0.55):r5(v);}
// Snatch Grip RDL: start 95→210 (progressive hold)
function sgrdlWt(w){const v=lerp(95,210,w,1,35);return isDl(w)?r5(v*0.55):r5(v);}
// Cable Swing: 15→52 lbs
function cableWt(w){return lerp(15,52,w,1,35);}
// Cable SLRDL Rear Delt Fly: 10→42 lbs
function cslrdlWt(w){return lerp(10,42,w,1,35);}
// Cable Lift/Chop: 15→48 lbs
function cliftWt(w){return lerp(15,48,w,1,35);}

// Conditioning
function rowPace(w){const s=lerp(105,91,w,1,35);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function run400(w){return lerp(58,49,w,9,35);}

function setsReps(w){
  if(isDl(w))return'3×5';
  if(w<=12)return'4×'+(w<=4?'6':w<=8?'6':'5');
  if(isWave(w)){
    const k=((w-1)%4)+1;
    if(w<=16)return k<=2?'10-8-6-5':k===3?'8-6-5-3':'3×5';
    if(w<=20)return k===1?'8-6-4-2':k===2?'6-4-3-2':k===3?'6-4-2-1':'3×4';
    return k===1?'5-3-2-1':k===2?'5-3-1-1':k===3?'4-2-1-1':'3×3';
  }
  if(isConv(w))return'Max+3×2';
  return'4×5';
}
function triStr(w){if(w<=28)return'ECC 5s';if(w<=32)return'ISO 3s';return'EXPLOSIVE';}

// Split squat alternation: odd weeks = front rack, even weeks = back BSS
function ssName(w){return w%2===1?'Front Rack Split Squat':'Back Barbell BSS';}
function ssNote(w){return w%2===1?'Front rack. Upright torso. Thoracic extension.':'Rear foot elevated. Deep ROM. Glute + posterior chain.';}

// Pull-up rotation
function puLabel(w){return w%2===1?'Weighted Pull-ups':'Weighted Chin-ups';}

// ═══════════════════════════════════════════════════════════
// EVENING — YOGA 6x/WEEK
// ═══════════════════════════════════════════════════════════
function getEvening(d){
  if(d===0)return{title:'EVENING',focus:'Yoga',duration:'50 min',options:[E('Yoga','7:30 – 8:20 PM','Yin. Deep recovery.'),E('Right-Side Protocol','10 min at home','')]};
  if(d===1)return{title:'EVENING',focus:'Yoga',duration:'50 min',options:[E('Yoga','6:00 – 6:50 PM','Vinyasa flow.'),E('Right-Side Protocol','10 min at home','')]};
  if(d===2)return{title:'EVENING',focus:'Yoga',duration:'55 min',options:[E('Yoga','5:15 – 6:10 PM','Vinyasa. T-spine rotation.'),E('Right-Side Protocol','10 min at home','')]};
  if(d===3)return{title:'EVENING',focus:'Yoga',duration:'50 min',options:[E('Yoga','6:00 – 7:00 PM','Deep hip openers.'),E('Right-Side Protocol','10 min at home','')]};
  if(d===4)return{title:'EVENING',focus:'Yoga',duration:'60 min',options:[E('Yoga','5:15 – 6:15 PM','Yin after Snake day.'),E('Right-Side Protocol','10 min at home','')]};
  if(d===5)return{title:'EVENING',focus:'Yoga',duration:'60 min',options:[E('Yoga','3:45 – 4:45 PM','Full body mobility.'),E('Right-Side Protocol','10 min at home','')]};
  return{title:'EVENING',focus:'Full Rest',duration:'—',options:[E('Cold Plunge','5-10 min',''),E('Right-Side Protocol','10 min at home','')]};
}

// ═══════════════════════════════════════════════════════════
// MONDAY — THE GORILLA
// ═══════════════════════════════════════════════════════════
function getMonday(w){
  const DL=isDl(w);
  const m=[];
  m.push(E('Slow Cable Swing','3×6 each (16s/rep) @ '+cableWt(w)+' lbs','Rotational opener.'));
  if(isConv(w)){
    m.push(E('Power Clean — Daily Max','Work to max ('+triStr(w)+')','Target: ~'+r5(cleanWt(w)*1.15)+' lbs'));
    m.push(E('Power Clean Back-off','3×2 @ '+r5(cleanWt(w)*0.9)+' lbs',''));
  } else {
    m.push(E('Power Clean',setsReps(w)+' @ '+cleanWt(w)+' lbs','Triple extension. Feel the ground up.'));
  }
  m.push(E('Incline Barbell Bench',setsReps(w)+' @ '+benchWt(w)+' lbs','Shoulder-safe pressing.'));
  m.push(E('Barbell Hip Thrust',(isConv(w)?'4×4 ('+triStr(w)+') @ '+htWt(w):'4×8 @ '+htWt(w))+' lbs'+(DL?'':' + bo 1×12@'+r5(htWt(w)*0.65)),'2s squeeze at top.'));
  m.push(E(puLabel(w),'4×'+(w<=12?'6':w<=24?'4':'3')+' @ +'+puWt(w)+' lbs','Full ROM. Dead hang at bottom.'));
  m.push(E('Barbell Cossack Squat',(w<=4?'3×8 each BW':'3×'+(w<=12?'8':'6')+' each @ '+cosWt(w)+' lbs'),'3s hold at bottom. Closer.'));
  return{title:'THE GORILLA',focus:'Power + Push + Hinge',duration:'75 min',
    conditioning:[],core:[],prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// TUESDAY — THE PREDATOR
// ═══════════════════════════════════════════════════════════
function getTuesday(w){
  const DL=isDl(w);
  const cond=[E('Row',DL?'15 min easy':w<=12?'15-20 min @ '+rowPace(w)+'/500m':w<=24?'15-20 min @ '+rowPace(w)+'/500m':'15-20 min @ '+rowPace(w)+'/500m','Aerobic engine.')];
  const core=[
    E('E-Ball Steamrollers','3×'+(w<=8?'30s':w<=16?'45s':'60s')+' each dir','Anti-fragmentation. Trunk unity.'),
    E('Seated Squeeze Ball Rotation','3×10 each','Ball between knees + biceps. '+(w<=4?'Floor. Feet down.':w<=12?'E-ball. Feet on ground.':w<=24?'E-ball. Feet LIFTED.':'E-ball. Feet up. Heavier MB.')),
    E('Turkish Get Up','2×3 each side','~'+(w<=4?'25-30':w<=12?'35-50':w<=24?'50-65':'65-80')+' lbs. Right side = focus.')
  ];
  const m=[];
  m.push(E('Sprints',DL?'4×20m @ 75%':'6×10m + 4×20m + 2×40m',w<=12?'Mechanics first.':w<=24?'Speed development.':'Max velocity.'));
  m.push(E('6A: Half-Kneeling Cable Lift (low to high)','3×8 each @ '+cliftWt(w)+' lbs','Backswing pattern. Thoracic rotation. Hip flexor stretch. Superset with 6B.'));
  m.push(E('6B: Half-Kneeling Cable Chop (high to low)','3×8 each @ '+cliftWt(w)+' lbs','Downswing pattern. Deceleration. Superset with 6A.'));
  return{title:'THE PREDATOR',focus:'Explosive + Rotational + Core',duration:'75 min',
    conditioning:cond,core:core,prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// WEDNESDAY — THE PANTHER
// ═══════════════════════════════════════════════════════════
function getWednesday(w){
  const DL=isDl(w);
  const m=[];
  m.push(E('Slow Cable Swing','3×6 each (16s/rep) @ '+cableWt(w)+' lbs','Second swing day.'));
  m.push(E('Pendlay Row (explosive)',(isConv(w)?'5×3':setsReps(w))+' @ '+rowWt(w)+' lbs + bo 1×10@'+r5(rowWt(w)*0.65),'Dead stop. Violent off floor.'));
  m.push(E(ssName(w),'4×'+(w<=12?'8':'6')+' each @ '+ssWt(w)+' lbs',ssNote(w)));
  m.push(E('Cable SLRDL to Rear Delt Fly','3×8 each @ '+cslrdlWt(w)+' lbs','Hip hinge + glute + rear delt + anti-rotation core. THE hybrid.'));
  m.push(E('DB Arnold Press','4×'+(w<=12?'8':'6')+' @ '+pressWt(w)+' lbs ea','Internal to external rotation under load.'));
  m.push(E('Barbell Cossack Squat',(w<=4?'3×8 each BW':'3×'+(w<=12?'8':'6')+' each @ '+cosWt(w)+' lbs'),'3s hold at bottom. Closer.'));
  return{title:'THE PANTHER',focus:'Pull + Unilateral + Hybrid',duration:'75 min',
    conditioning:[],core:[],prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// THURSDAY — THE ENGINE
// ═══════════════════════════════════════════════════════════
function getThursday(w){
  const DL=isDl(w);
  const cond=[E('Row',DL?'20 min easy':w<=12?'25 min @ '+rowPace(w)+'/500m':w<=24?'30 min @ '+rowPace(w)+'/500m':'4×7min @ '+rowPace(w)+'/500m','The long row. Stroke quality.')];
  const core=[
    E('E-Ball Steamrollers','3×'+(w<=8?'30s':w<=16?'45s':'60s')+' each dir',''),
    E('Seated Squeeze Ball Rotation','3×10 each','Ball between knees + biceps. '+(w<=4?'Floor. Feet down.':w<=12?'E-ball. Feet on ground.':w<=24?'E-ball. Feet LIFTED.':'E-ball. Feet up. Heavier MB.')),
    E('Turkish Get Up','2×3 each side','~'+(w<=4?'25-30':w<=12?'35-50':w<=24?'50-65':'65-80')+' lbs.')
  ];
  const m=[];
  m.push(E('Ring Practice','20 min','Skin the cats FIRST. Front/back levers. Muscle-up progression. L-sits. Ring dips. Support holds with turnout.'));
  m.push(E('Handstand Practice','5-10 min','Wall-assisted → freestanding. Shoulder stability. Body control.'));
  return{title:'THE ENGINE',focus:'Row + Core + Rings + Handstands',duration:'75 min',
    conditioning:cond,core:core,prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// FRIDAY — THE SNAKE
// ═══════════════════════════════════════════════════════════
function getFriday(w){
  const DL=isDl(w);
  const m=[];
  m.push(E('Slow Cable Swing','3×6 each (16s/rep) @ '+cableWt(w)+' lbs','Third swing day.'));
  if(isConv(w)){
    m.push(E('Snatch — Daily Max','Work to max','Target: ~'+r5(snWt(w)*1.15)+' lbs'));
  } else {
    m.push(E(w<=8?'Hang Snatch':'Snatch',(w<=8?'5×3':'4×'+(w<=16?'3':'2'))+' @ '+snWt(w)+' lbs','Full extension. Feel everything connect.'));
  }
  m.push(E('Overhead Squat','4×'+(w<=12?'5':'3')+' @ '+ohsWt(w)+' lbs','3s hold at bottom. THE mobility exercise.'));
  m.push(E('Snatch Grip RDL (1-inch hold)','3×5 (5s hold) @ '+sgrdlWt(w)+' lbs','The ONLY exercise that activates your glutes. Wide grip. Hold 1 inch off floor.'));
  m.push(E('5A: Half-Kneeling Cable Lift','3×8 each @ '+cliftWt(w)+' lbs','Low to high. Superset with 5B.'));
  m.push(E('5B: Half-Kneeling Cable Chop','3×8 each @ '+cliftWt(w)+' lbs','High to low. Superset with 5A.'));
  m.push(E('Barbell Cossack Squat',(w<=4?'3×8 each BW':'3×'+(w<=12?'8':'6')+' each @ '+cosWt(w)+' lbs'),'3s hold at bottom. Closer.'));
  return{title:'THE SNAKE',focus:'Olympic + Mobility + Rotation',duration:'75 min',
    conditioning:[],core:[],prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// SATURDAY — THE HUNTER
// ═══════════════════════════════════════════════════════════
function getSaturday(w){
  const DL=isDl(w);
  const cond=[E('Run',DL?'20 min easy':w<=8?'25 min @ <153bpm':w<=12?'4×400m @ '+run400(Math.max(w,9))+'s':w<=24?'6×400m @ '+run400(w)+'s':'8×400m @ '+run400(w)+'s','FORM focus. Glute drive. Trunk rotation.')];
  const core=[
    E('E-Ball Steamrollers','3×'+(w<=8?'30s':w<=16?'45s':'60s')+' each dir',''),
    E('Seated Squeeze Ball Rotation','3×10 each','Ball between knees + biceps. '+(w<=4?'Floor. Feet down.':w<=12?'E-ball. Feet on ground.':w<=24?'E-ball. Feet LIFTED.':'E-ball. Feet up. Heavier MB.')),
    E('Turkish Get Up','2×3 each side','~'+(w<=4?'25-30':w<=12?'35-50':w<=24?'50-65':'65-80')+' lbs.')
  ];
  const m=[];
  m.push(E('Ring Practice','15 min','Second ring day. Progression work. Skin the cats. Levers. Muscle-ups.'));
  m.push(E('Cable SLRDL to Rear Delt Fly','3×8 each @ '+cslrdlWt(w)+' lbs','Second hybrid day. Glute + shoulder + core.'));
  return{title:'THE HUNTER',focus:'Run + Core + Rings + Hybrid',duration:'75 min',
    conditioning:cond,core:core,prep:[],main:m,finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// SUNDAY — THE RESET
// ═══════════════════════════════════════════════════════════
function getSunday(w){
  return{title:'THE RESET',focus:'Cold Plunge + Recovery',duration:'30-40 min',
    conditioning:[],core:[],prep:[],
    main:[E('Cold Plunge','5-10 min',''),E('Hip 90/90','2 min each side','Non-negotiable.'),E('Foam Roll Full Body','10 min',''),E('Visualization','5 min','See yourself on the first tee.')],
    finisher:[]};
}

// ═══════════════════════════════════════════════════════════
// MASTER ROUTER
// ═══════════════════════════════════════════════════════════
function getSession(w,d){
  if(d===0)return getMonday(w);
  if(d===1)return getTuesday(w);
  if(d===2)return getWednesday(w);
  if(d===3)return getThursday(w);
  if(d===4)return getFriday(w);
  if(d===5)return getSaturday(w);
  return getSunday(w);
}

function getDayData(w,d){
  const s=getSession(w,d);
  return{
    am:{title:s.title,focus:s.focus,duration:s.duration,

// Confirm and write to Supabase — visual feedback
async function confirmSet(eid, setNum, btn){
  const row = _sets[eid] && _sets[eid][setNum];
  if(!row || (!row.wt && !row.reps)){ return; }

  // Show saving state
  btn.className = 'set-confirm saving';
  btn.textContent = '…';

  const wt = row.wt || '';
  const reps = row.reps || '';

  // Try PATCH first (update existing), then POST if no row exists
  let success = false;
  try {
    const patchRes = await sb(
      `set_logs?eid=eq.${encodeURIComponent(eid)}&set_num=eq.${setNum}`,
      'PATCH',
      {wt: String(wt), reps: String(reps)}
    );
    if(patchRes && patchRes.length > 0){
      success = true;
    } else {
      // No existing row — insert
      const postRes = await sb('set_logs', 'POST', {
        eid: eid,
        set_num: parseInt(setNum),
        wt: String(wt),
        reps: String(reps)
      });
      success = postRes !== null;
    }
  } catch(e){
    console.error('confirmSet error:', e);
    success = false;
  }

  if(success){
    _sets[eid][setNum].saved = true;
    save('sets', _sets);
    btn.className = 'set-confirm saved';
    btn.textContent = '✓';
  } else {
    btn.className = 'set-confirm failed';
    btn.textContent = '✗';
    // Reset after 2 seconds so they can retry
    setTimeout(()=>{ btn.className = 'set-confirm'; btn.textContent = '↑'; }, 2000);
  }
}

  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');

  const dn = dayNames[now.getDay()];

// ═══════════════════════════════════════════════════════════
// CALCULATE CURRENT WEEK
// ═══════════════════════════════════════════════════════════
function calcCurrentWeek(){
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Toronto'}));
  const diff = now - PROG_START;
  if(diff < 0) return {week:1, day:0};
  const totalDays = Math.floor(diff / (1000*60*60*24));
  const week = Math.floor(totalDays / 7) + 1;
  const day = totalDays % 7; // 0=Mon
  return {week: Math.min(Math.max(week,1),35), day: Math.min(day,6)};
}

// Detect time-based exercises
function isTimeExercise(name, detail){
  const n = name.toLowerCase();
  const d = (detail||'').toLowerCase();
  // EXCLUDE these — they use weight/reps or weight/distance
  if(/pendlay/i.test(n)) return false;
  if(/farmer/i.test(n)) return false;
  // Match rowing (not Pendlay Row), running, ski erg, 400m, 2000m, conditioning, sled, sprints
  if(/\brow\b|rower|rowing|row interval|easy row/i.test(n)) return true;
  if(/\brun\b|running/i.test(n)) return true;
  if(/ski\s*erg/i.test(n)) return true;
  if(/skip\s*rope/i.test(n)) return true;
  if(/\b400m\b|\b2000m\b|\b100m\b/i.test(n)) return true;
  if(/\bcondition/i.test(n) && /400m|row|run/i.test(d)) return true;
  if(/\bsled\b/i.test(n)) return true;
  if(/\bsprint/i.test(n)) return true;
  if(/\blinear sprint/i.test(n)) return true;
  // Check detail for time patterns (but not "40m" which could be carries)
  if(/\d+\s*[x×]\s*\d+\s*min/i.test(d)) return true;
  return false;
}

// Calculate pace from time and distance (e.g. "5:03" and "1130" → "/500m")
function calcPace(timeStr, distStr){
  if(!timeStr || !distStr) return '—';
  let totalSec = 0;
  const colonMatch = String(timeStr).match(/(\d+):(\d+)/);
  if(colonMatch){
    totalSec = parseInt(colonMatch[1])*60 + parseInt(colonMatch[2]);
  } else {
    const num = parseFloat(timeStr);
    if(num > 10) totalSec = num;
    else totalSec = num * 60;
  }
  const dist = parseFloat(distStr);
  if(!totalSec || !dist || dist === 0) return '—';
  const pacePerM = totalSec / dist;
  const pacePer500 = pacePerM * 500;
  const paceMin = Math.floor(pacePer500 / 60);
  const paceSec = Math.round(pacePer500 % 60);
  return paceMin+':'+String(paceSec).padStart(2,'0')+'/500m';
}

// Parse target for time-based exercises from their detail string
function parseTimeTarget(detail, name, week){
  const d = (detail||'').toLowerCase();
  const n = (name||'').toLowerCase();
  
  // Row with pace target: "5×5min@Z2", "4×8min@Z2-Z3", "40min@Z2"
  if(/\d+\s*[x×]\s*\d+\s*min\s*@/.test(d)){
    const m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*min\s*@\s*(.+?)(?:\s|$)/);
    if(m) return m[2]+'min @ '+m[3].toUpperCase();
  }
  if(/^\d+\s*min\s*@/.test(d)){
    const m = d.match(/(\d+)\s*min\s*@\s*(.+?)(?:\s|$)/);
    if(m) return m[1]+'min @ '+m[2].toUpperCase();
  }
  
  // Row intervals with pace: "8×3min@1:50/500m", "4×5min@1:45/500m"
  if(/\d+:\d+\/500/.test(d)){
    const m = d.match(/(\d+:\d+)\/500/);
    if(m) return m[1]+'/500m';
  }
  
  // 400m with time target: "6×400m@70s", "8×400m@sub-68s"
  if(/400m/.test(d)){
    const m = d.match(/@\s*(sub[- ]?\d+s?|\d+s)/i);
    if(m) return m[1];
    // Derive from week
    if(week<=12) return '< 90s';
    if(week<=22) return '< 78s';
    if(week<=32) return '< 72s';
    if(week<=42) return '< 68s';
    if(week<=61) return '< 68s';
    if(week<=71) return '< 65s';
    if(week<=83) return '< 62s';
    return '< 60s';
  }
  
  // Sprint with distance: "6×10m + 4×20m"
  if(/sprint/i.test(n) || /linear sprint/i.test(n)){
    if(week<=12) return 'Mechanics';
    if(week<=22) return 'Speed dev';
    if(week<=32) return 'Max velocity';
    if(week<=48) return 'Peak speed';
    if(week<=61) return 'Sub-11.3';
    if(week<=71) return 'Sub-11.0';
    if(week<=83) return 'Sub-10.9';
    return 'Sub-10.8';
  }
  
  // 100m test
  if(/100m/i.test(n)){
    if(week<=48) return '< 11.3s';
    if(week<=71) return '< 11.0s';
    return '< 10.8s';
  }
  
  // 2000m row test
  if(/2000m/i.test(n)){
    if(week<=48) return '< 1:45/500m';
    if(week<=71) return '< 1:40/500m';
    return '< 1:38/500m';
  }
  
  // 10K run
  if(/10k/i.test(n) || /10k/i.test(d)){
    if(week<=48) return '< 43min';
    if(week<=71) return '< 35min';
    return '< 34min';
  }
  
  // 5K/6K/7K/8K runs
  const kmMatch = d.match(/(\d)k\s*run/i);
  if(kmMatch){
    const km = parseInt(kmMatch[1]);
    return '~'+(km*4.5)+'min';
  }
  
  // Sled with distance: "8×20m heavy"
  if(/sled/i.test(n)){
    const m = d.match(/(\d+)\s*[x×]\s*(\d+)m/);
    if(m) return m[2]+'m @ heavy';
    return 'Max effort';
  }
  
  // Generic row
  if(/^row$/i.test(n.trim()) || /easy row/i.test(n)){
    if(week<=12) return 'Z2 HR';
    if(week<=32) return '< 1:50/500m';
    if(week<=48) return '< 1:45/500m';
    if(week<=71) return '< 1:42/500m';
    return '< 1:38/500m';
  }
  
  // Run
  if(/^run$/i.test(n.trim())){
    if(week<=8) return '< 153bpm';
    if(week<=16) return 'Easy pace';
    if(week<=24) return 'w/ tempo blocks';
    if(week<=36) return 'w/ sustained tempo';
    return 'Race pace';
  }

  // Ski Erg
  if(/ski\s*erg/i.test(n)){
    if(week<=12) return 'Build effort';
    if(week<=24) return 'Hard intervals';
    if(week<=36) return 'Race effort';
    return 'Peak effort';
  }

  // Skip Rope
  if(/skip\s*rope/i.test(n)){
    if(week<=12) return 'Continuous';
    if(week<=24) return 'Min rest';
    return 'Long intervals';
  }
  
  // Row intervals
  if(/row interval/i.test(n)){
    if(week<=42) return '< 1:50/500m';
    if(week<=61) return '< 1:45/500m';
    if(week<=71) return '< 1:42/500m';
    return '< 1:38/500m';
  }
  
  // Conditioning catch-all
  if(/condition/i.test(n)){
    if(/row/i.test(d)) return 'Z2 HR';
    if(/400m/i.test(d)) return '< 75s';
    return '—';
  }
  
  return '—';
}

// Parse target for carry exercises from their detail string
function parseCarryTarget(detail){

  // "4 × 40m heavy", "3×30m moderate"
  const m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*m\s*(heavy|moderate|light)?/i);

    return {wt: load||'heavy', dist: m[2]+'m'};

}

// ═══════════════════════════════════════════════════════════
// EXERCISE PARSER — extracts sets, reps, percentage from detail string
// ═══════════════════════════════════════════════════════════
function parseExercise(detail, name){
  if(!detail) return {sets:0, reps:0, pct:0, repScheme:[]};
  const d = detail;

  // ── Wave loading: "10-8-6-5 @ 65-75-80-83%"
  let m = d.match(/^(\d+[-–]\d+(?:[-–]\d+)*)\s*@\s*(\d+)[-–](\d+)[-–]?(\d+)?[-–]?(\d+)?%/);
  if(m){
    const reps = m[1].split(/[-–]/).map(Number);
    const pcts = [m[2],m[3],m[4],m[5]].filter(Boolean).map(Number);
    // Use the highest percentage as the working target
    return {sets:reps.length, reps:0, pct:pcts[pcts.length-1]||pcts[0], repScheme:reps, pctScheme:pcts};
  }

  // ── "NxN @ NN%" pattern
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*[+]?(\d+)%/i);
  if(m){
    const sets=parseInt(m[1]), reps=parseInt(m[2]), pct=parseInt(m[3]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "NxN @ +NNlbs" (weighted pull-ups etc)
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*[+]?(\d+)\s*lbs/i);
  if(m){
    return {sets:parseInt(m[1]), reps:parseInt(m[2]), pct:0, repScheme:Array(parseInt(m[1])).fill(parseInt(m[2])), fixedWt:parseInt(m[3])};
  }

  // ── "NxN BW" or "NxN bodyweight"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*(BW|bodyweight)/i);
  if(m){
    return {sets:parseInt(m[1]), reps:parseInt(m[2]), pct:0, repScheme:Array(parseInt(m[1])).fill(parseInt(m[2]))};
  }

  // ── "NxN @ moderate" or "NxN @ heavy" etc (no specific %)
  m = d.match(/(\d+)\s*[x×]\s*(\d+)/i);
  if(m){
    // Try to find a percentage after
    const pctM = d.match(/(\d+)%/);
    const pct = pctM ? parseInt(pctM[1]) : 0;
    const sets=parseInt(m[1]), reps=parseInt(m[2]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "DELOAD: 3x5 @ 65%"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*(\d+)%/i);
  if(m){
    const sets=parseInt(m[1]), reps=parseInt(m[2]), pct=parseInt(m[3]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "~5-7 sets to technical max" or "Work to Daily Max"
  if(/work to/i.test(d)){
    return {sets:6, reps:1, pct:0, repScheme:[1,1,1,1,1,1]};
  }
  m = d.match(/~?(\d+)[-–](\d+)\s*sets/i);
  if(m){
    const sets = Math.ceil((parseInt(m[1])+parseInt(m[2]))/2);
    return {sets, reps:1, pct:0, repScheme:Array(sets).fill(1)};
  }

  // ── "N attempts"
  m = d.match(/(\d+)\s*attempt/i);
  if(m){
    return {sets:parseInt(m[1]), reps:1, pct:0, repScheme:Array(parseInt(m[1])).fill(1)};
  }

  // ── Time-based single entry (e.g. "25 min @ 1:45/500m", "20 min easy", "40 min w/ tempo")
  // Give 1 set for tracking TIME/DIST/PACE
  if(/^\d+\s*min/i.test(d)) return {sets:1, reps:0, pct:0, repScheme:[0], isConditioning:true};
  if(/sec/i.test(d) && !/[x×]/i.test(d)) return {sets:0, reps:0, pct:0, repScheme:[]};

  // ── Conditioning patterns: "5×5min", "6×10m", "8×20m", "4×400m", "2×(4×400m)"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*(min|m\b|sec)/i);
  if(m){
    return {sets:parseInt(m[1]), reps:0, pct:0, repScheme:Array(parseInt(m[1])).fill(0), isConditioning:true};
  }

  // Fallback
  m = d.match(/^(\d+)\s*[x×]/i);
  if(m) return {sets:parseInt(m[1]), reps:0, pct:0, repScheme:Array(parseInt(m[1])).fill(0)};

  return {sets:0, reps:0, pct:0, repScheme:[]};
}

// TARGET WEIGHT CALCULATOR — from PRs × prescribed %
// ═══════════════════════════════════════════════════════════
const EXERCISE_PR_MAP = {
  'Power Clean':'Power Clean',
  'Back Squat':'Back Squat',
  'Back Squat — Work to Daily Max':'Back Squat',
  'Back Squat Back-off':'Back Squat',
  'Back Squat — 1RM Test':'Back Squat',
  'Power Clean — Work to Daily Max':'Power Clean',
  'Power Clean Back-off':'Power Clean',
  'Power Clean — 1RM Test':'Power Clean',
  'Snatch — Work to Daily Max':'Snatch',
  'Snatch Back-off':'Snatch',
  'Snatch — 1RM Test':'Snatch',
  'Hang Snatch':'Snatch', 'Snatch':'Snatch',
  'BB Hip Thrust':'BB Hip Thrust',
  'Flat Bench Press':'Bench Press', 'Bench Press':'Bench Press',
  'Bench Press — 1RM Test':'Bench Press',
  'Pendlay Row':'Pendlay Row',
  'Pendlay Row — 1RM Test':'Pendlay Row',
  'Weighted Pull-ups':'Weighted Pull-ups',
  'Chin-ups (Weighted)':'Weighted Pull-ups',
  'Weighted Pull-ups — Max Test':'Weighted Pull-ups',
  'Front Rack BSS':'Back Squat',
  'Deficit Reverse Lunge':'Back Squat',
  'SLRDL':'Back Squat',
  'DB Shoulder Press':'DB Shoulder Press',
  'DB Shoulder Press — Max Test':'DB Shoulder Press',
  'Barbell Cossack Squat':'Barbell Cossack Squat',
  'Barbell Cossack Squat — Max Test':'Barbell Cossack Squat',
  'Overhead Squat':'Overhead Squat',
  'Overhead Squat — 1RM Test':'Overhead Squat',
  'Trap Bar Jumps':'Trap Bar Jumps',
  'BB Hip Thrust — 1RM Test':'BB Hip Thrust',
  'Landmine Press':'Bench Press',
  'Nordic Curls':'Nordic Curls',
  'Handstand Push-up Progression':'Handstand Push-up Progression',
};

function calcTarget(exName, pct, detail){
  // 1. If we have a percentage AND a mapped PR, calculate from 1RM
  if(pct && pct > 0){
    const prKey = EXERCISE_PR_MAP[exName];
    if(prKey){
      const prs = getPRs();
      const pr1rm = prs[prKey];
      if(pr1rm && pr1rm > 0){
        return Math.round((pct / 100) * pr1rm / 5) * 5;
      }
    }
  }
  // 2. If detail has a fixed weight like "+70 lbs", "@155-175", "@ 80-85 lbs", "@ moderate-heavy"
  if(detail){
    // Match "+NN lbs" or "+NN" for weighted pull-ups/chin-ups
    let m = detail.match(/@\s*\+?(\d+)(?:\s*lbs)?/);
    if(m) return parseInt(m[1]);
    // Match "@ NN-NN lbs" or "@ NN lbs" — take the higher number
    m = detail.match(/@\s*(\d+)[-–]?(\d+)?\s*(?:lbs)?/);
    if(m){
      const v = m[2] ? parseInt(m[2]) : parseInt(m[1]);
      // Only return if it looks like a weight (not a percentage)
      if(v > 0 && !/%/.test(detail.slice(detail.indexOf(m[0])))) return v;
    }
    // Match fixed weights in the string like "4×5@205-225" — take higher
    m = detail.match(/(\d+)\s*[x×]\s*\d+\s*@\s*(\d+)[-–]?(\d+)?/);
    if(m && !/%/.test(detail)){
      return m[3] ? parseInt(m[3]) : parseInt(m[2]);
    }
  }
  return 0;
}

function updatePctBadge(input){
  const eid = input.dataset.eid;
  const setNum = input.dataset.set;
  const target = parseFloat(input.dataset.target);
  const actual = parseFloat(input.value);
  const badge = document.querySelector(`.pct-badge[data-eid="${eid}"][data-set="${setNum}"]`);
  if(!badge) return;

  if(target > 0 && actual > 0){
    const pctVal = Math.round((actual / target) * 100);
    badge.textContent = pctVal + '%';
    badge.className = 'pct-badge ' + (pctVal >= 100 ? 'hit' : pctVal >= 90 ? 'neutral' : 'miss');
  } else {
    badge.textContent = '—';
    badge.className = 'pct-badge neutral';
  }
}

function getNutKey(){

  const key = getNutKey()+'_'+meal.id;
  if(_nutOverrides[key]) return _nutOverrides[key];

function updateNutSummary(){
  const targets = getNutTargets();
  let totP=0, totC=0, totF=0;
  const today = getNutKey();
  MEALS.forEach(m=>{
    const key = today+'_'+m.id;
    if(_nutChecks[key]){
      const mac = getMealMacros(m);
      totP += mac.p; totC += mac.c; totF += mac.f;
    }
  });
  const totCal = totP*4 + totC*4 + totF*9;

  const setBar = (id, val, target) => {
    const el = document.getElementById(id);
    if(!el) return;
    const pct = Math.min(Math.round(val/target*100),150);
    el.querySelector('.nut-macro-val').textContent = val;
    el.querySelector('.nut-macro-target').textContent = '/ '+target;
    const fill = el.querySelector('.nut-macro-fill');
    fill.style.width = Math.min(pct,100)+'%';
    fill.className = 'nut-macro-fill '+(pct>=90&&pct<=110?'on-track':pct>110?'over':'under');
  };
  setBar('nm-cal', totCal, targets.cal);
  setBar('nm-p', totP, targets.p);
  setBar('nm-c', totC, targets.c);
  setBar('nm-f', totF, targets.f);
}

    h += `<div class="nut-macro-val">0</div>`;
    h += `<div class="nut-macro-target">/ ${target}</div>`;
    h += `<div class="nut-macro-bar"><div class="nut-macro-fill under" style="width:0%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Meal blocks
  MEALS.forEach(m=>{
    const key = today+'_'+m.id;
    const checked = _nutChecks[key];
    const mac = getMealMacros(m);
    const cal = mac.p*4 + mac.c*4 + mac.f*9;
    const ov = _nutOverrides[key];

    h += `<div class="meal-block${checked?' open':''}">`;
    h += `<div class="meal-header" onclick="toggleMealBlock(this)">`;
    h += `<div class="meal-time">${m.time}</div>`;
    h += `<div class="meal-name">${m.name}</div>`;
    h += `<div class="meal-macros-preview">${mac.p}P ${mac.c}C ${mac.f}F · ${cal} cal</div>`;
    h += `<button class="meal-confirm${checked?' done':''}" onclick="event.stopPropagation();toggleMealCheck('${m.id}',this)">${checked?'✓':''}</button>`;
    h += `</div>`;

    h += `<div class="meal-body">`;
    h += `<div class="meal-items">${m.items}</div>`;
    h += `<div class="meal-why">${m.why}</div>`;
    if(m.locked){
      h += `<div class="meal-locked">FIXED PROTOCOL — SAME EVERY DAY</div>`;
    } else {
      h += `<div class="meal-override">`;
      h += `<button class="meal-override-btn" onclick="showOverride('${m.id}')">OVERRIDE MACROS (ate something different)</button>`;
      h += `<div class="meal-override-inputs${ov?' show':''}" id="ov_${m.id}">`;
      h += `<div><div class="meal-ov-label">PROTEIN</div><input class="meal-ov-input" type="number" id="ov_p_${m.id}" placeholder="${m.macros.p}" value="${ov?ov.p:''}" onchange="saveOverride('${m.id}')"></div>`;
      h += `<div><div class="meal-ov-label">CARBS</div><input class="meal-ov-input" type="number" id="ov_c_${m.id}" placeholder="${m.macros.c}" value="${ov?ov.c:''}" onchange="saveOverride('${m.id}')"></div>`;
      h += `<div><div class="meal-ov-label">FAT</div><input class="meal-ov-input" type="number" id="ov_f_${m.id}" placeholder="${m.macros.f}" value="${ov?ov.f:''}" onchange="saveOverride('${m.id}')"></div>`;
      h += `</div></div>`;
    }
    h += `</div></div>`;
  });

  // Supplements
  h += `<div class="supp-block">`;
  h += `<div class="supp-title">DAILY SUPPLEMENTS</div>`;
  SUPPS.forEach((s,i)=>{
    const skey = today+'_supp_'+i;
    const sdone = _suppChecks[skey];
    h += `<div class="supp-row">`;
    h += `<div class="supp-time">${s.time}</div>`;
    h += `<div class="supp-name">${s.name}</div>`;
    h += `<div class="supp-why">${s.why}</div>`;
    h += `<button class="supp-check${sdone?' done':''}" onclick="toggleSuppCheck(${i},this)">✓</button>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Hydration reminder
  h += `<div class="hydration-card">`;
  h += `<div class="hydration-title">HYDRATION</div>`;
  h += `<div class="hydration-text">4+ liters of water with lemon throughout the day</div>`;
  h += `<div class="hydration-note">Dehydration at your training volume compromises next-day session quality. Sip consistently — don't chug.</div>`;
  h += `</div>`;

  p.innerHTML = h;

  // Update summary after render
  setTimeout(updateNutSummary, 50);
}

function markComplete(){
  const done = !isComplete(curWeek, curDay);
  setCompletion(curWeek, curDay, done);
  renderAll();
}

function renderPlan(){
  const p = document.getElementById('p-plan');
  let h = '';
  PHASES.forEach((ph,pi)=>{
    h += `<div style="margin-bottom:28px;">`;
    h += `<div class="ph-title">Phase ${pi+1} — ${ph.n}</div>`;
    h += `<div class="ph-desc">${ph.desc}</div>`;
    for(let w=ph.wks[0]; w<=ph.wks[1]; w++){
      const isCur = w===curWeek;
      const allDone = [0,1,2,3,4,5,6].every(d=>isComplete(w,d));
      const focus = getPhase(w).n;
      h += `<div class="pw-row${isCur?' cur':''}" onclick="curWeek=${w};curDay=0;nav('today')">`;
      h += `<div class="pw-num">Week ${w}</div>`;
      h += `<div class="pw-focus">${focus} — W${w}</div>`;
      h += `<div class="pw-status">${allDone?'✓ COMPLETE':isCur?'CURRENT':'—'}</div>`;
      h += `</div>`;
    }
    h += `</div>`;
  });
  p.innerHTML = h;
}

function renderStats(){
  const p = document.getElementById('p-stats');
  const prs = getPRs();
  const comp = getCompletions();
  const totalSessions = Object.keys(comp).filter(k=>comp[k]).length;
  const totalPossible = curWeek * 7;

  // All metrics: current, Y1 target, 3-year target
  const liftTargets = [
    {name:'Back Squat',cur:'405×3',curNum:405,y1:530,y3:675,unit:'lbs'},
    {name:'Front Rack BSS',cur:'95×8',curNum:95,y1:365,y3:540,unit:'lbs'},
    {name:'Overhead Squat',cur:'135×5',curNum:135,y1:245,y3:315,unit:'lbs'},
    {name:'Power Clean',cur:'170×6',curNum:170,y1:295,y3:400,unit:'lbs'},
    {name:'Snatch',cur:'105×3',curNum:105,y1:175,y3:230,unit:'lbs'},
    {name:'Pendlay Row',cur:'135×6',curNum:135,y1:265,y3:315,unit:'lbs'},
    {name:'Weighted Pull-up',cur:'+25×6',curNum:25,y1:100,y3:175,unit:'lbs'},
    {name:'Weighted Chin-up',cur:'+25×5',curNum:25,y1:100,y3:175,unit:'lbs'},
    {name:'Bench Press',cur:'285×1',curNum:285,y1:315,y3:315,unit:'lbs'},
    {name:'DB Shoulder Press',cur:'65×8',curNum:65,y1:90,y3:100,unit:'lbs'},
    {name:'Bulgarian Split Squat',cur:'100×8',curNum:100,y1:185,y3:315,unit:'lbs'},
    {name:'Barbell Cossack Squat',cur:'BW',curNum:0,y1:175,y3:315,unit:'lbs'},
    {name:'Trap Bar Jumps',cur:'135×5',curNum:135,y1:225,y3:315,unit:'lbs'},
  ];
  const condTargets = [
    {name:'2000m Row',cur:'2:05/500m',curNum:125,y1:105,y3:95,unit:'/500m',lower:true},
    {name:'100m Sprint',cur:'~12.0 sec',curNum:12,y1:11.3,y3:10.7,unit:'sec',lower:true},
    {name:'10K Run',cur:'~55 min',curNum:55,y1:42,y3:31,unit:'min',lower:true},
    {name:'400m Run',cur:'N/A',curNum:90,y1:70,y3:62,unit:'sec',lower:true},
  ];
  const golfTargets = [
    {name:'Driver Clubhead Speed',cur:'127 mph',curNum:127,y1:133,y3:138,unit:'mph'},
    {name:'Carry Distance',cur:'310 yds',curNum:310,y1:335,y3:350,unit:'yds'},
    {name:'Handicap',cur:'8-9',curNum:9,y1:5,y3:0,unit:'',lower:true},
  ];
  const mobilityTargets = [
    {name:'Forward Splits',cur:'Partial',curNum:20,y1:95,y3:100,unit:'%'},
    {name:'Lateral Splits',cur:'Partial',curNum:15,y1:85,y3:100,unit:'%'},
    {name:'Right Hip IR',cur:'Restricted',curNum:30,y1:85,y3:100,unit:'%'},
    {name:'HSPU',cur:'5s wall hold',curNum:5,y1:80,y3:100,unit:'%'},
  ];

  let h = '';

  // Overview cards
  h += `<div class="ph-title" style="margin-bottom:20px;">PROGRAM OVERVIEW</div>`;
  h += `<div class="sg">`;
  h += `<div class="sc"><div class="sc-l">Sessions Completed</div><div class="sc-v">${totalSessions}</div><div class="sc-s">of ${totalPossible} possible</div></div>`;
  h += `<div class="sc"><div class="sc-l">Current Week</div><div class="sc-v">${curWeek}</div><div class="sc-s">of 52 · Year 1</div></div>`;
  h += `<div class="sc"><div class="sc-l">Phase</div><div class="sc-v">${getPhaseNum(curWeek)}</div><div class="sc-s">${getPhase(curWeek).n}</div></div>`;
  h += `<div class="sc"><div class="sc-l">Completion Rate</div><div class="sc-v">${totalPossible?Math.round(totalSessions/totalPossible*100):0}%</div><div class="sc-s">consistency is everything</div></div>`;
  h += `</div>`;

  // Helper for progress sections
  function renderSection(title, items){
    h += `<div class="ph-title" style="margin-bottom:14px;margin-top:28px;">${title}</div>`;
    items.forEach(t=>{
      const curPR = prs[t.name] || t.curNum;
      const range = t.y1 - t.curNum;
      const progress = range !== 0 ? Math.min(Math.max(Math.round(((curPR - t.curNum) / range) * 100),0),100) : 0;
      h += `<div class="sc" style="margin-bottom:8px;">`;
      h += `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">`;
      h += `<div><div class="sc-l" style="margin-bottom:2px;">${t.name}</div>`;
      h += `<div style="font-size:10px;color:var(--text-tertiary);">Start: ${t.cur}</div></div>`;
      h += `<div style="text-align:right;">`;
      h += `<div style="font-family:'LEMON MILK',sans-serif;font-size:11px;letter-spacing:1px;color:var(--text);">Y1: ${t.y1}${t.unit?(' '+t.unit):''}</div>`;
      h += `<div style="font-size:9px;color:var(--text-tertiary);">3YR: ${t.y3}${t.unit?(' '+t.unit):''}</div>`;
      h += `</div></div>`;
      h += `<div class="prog-bar"><div class="prog-fill" style="width:${Math.max(progress,2)}%"></div></div>`;
      h += `</div>`;
    });
  }

  renderSection('STRENGTH', liftTargets);
  renderSection('CONDITIONING', condTargets);
  renderSection('GOLF PERFORMANCE', golfTargets);
  renderSection('MOBILITY + SKILLS', mobilityTargets);

  p.innerHTML = h;
}

function renderPRs(){
  const p = document.getElementById('p-prs');
  const prs = getPRs();
  let h = `<div class="pr-title">PERSONAL RECORDS</div>`;

  Object.keys(prs).forEach(lift=>{
    h += `<div class="pr-row"><div class="pr-name">${lift}</div><div class="pr-val">${prs[lift]} lbs</div></div>`;
  });

  h += `<div style="margin-top:24px;"><div class="pr-title" style="font-size:9px;">UPDATE A PR</div>`;
  h += `<div class="pr-form">`;
  h += `<div class="pr-fg"><label>Exercise</label><select id="prSelect">`;
  Object.keys(prs).forEach(lift=>{ h += `<option value="${lift}">${lift}</option>`; });
  h += `</select></div>`;
  h += `<div class="pr-fg"><label>Weight (lbs)</label><input type="number" id="prWeight" placeholder="0"></div>`;
  h += `<button class="pr-add" onclick="addPR()">UPDATE PR</button>`;
  h += `</div></div>`;

  p.innerHTML = h;
}

function addPR(){
  const sel = document.getElementById('prSelect');
  const wt = document.getElementById('prWeight');
  if(sel && wt && wt.value){
    setPR(sel.value, parseInt(wt.value));
    renderPRs();
    renderStats();
  }
}

function renderAll(){
  const phase = getPhase(curWeek);
  const pn = getPhaseNum(curWeek);
  document.getElementById('phaseTag').textContent = `Phase ${pn} · Week ${curWeek}`;
  document.getElementById('weekLbl').textContent = `Week ${curWeek} / 35`;

  renderDayTabs();
  renderWorkout();
  renderPlan();
  renderStats();
  renderNutrition();
  renderPRs();
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function nav(view){
  curView = view;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('on', b.dataset.v===view));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+view).classList.add('on');
  if(view==='today') renderWorkout();
}

function chgWeek(dir){
  curWeek = Math.min(Math.max(curWeek+dir,1),35);
  curDay = 0;
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function startApp(){
  // 1. Load from local cache (instant UI)
  loadFromCache();
  
  const c = calcCurrentWeek();
  curWeek = c.week;
  curDay = c.day;
  updateClock();
  setInterval(updateClock, 1000);
  renderAll();

  // 2. Sync from Supabase in background (permanent source of truth)
  await loadFromSupabase();
  renderAll(); // Re-render with fresh data from DB
}
</script>

</html>
